<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masque de Fer</title>
    <link rel="stylesheet" href="styles.css?v=5" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="header"></div>

    <main class="main">
      <div class="card">
        <h1>Salut!</h1>
        <p>
          Wij zijn Masque de Fer, een schermvereniging in Zwijndrecht. Wij
          schermen op vrijdagavonden van 20:00-22:00 met een kleine, maar trouwe
          troupe.
        </p>

        <p>
          Benieuwd naar hoe het er bij ons aan toe gaat? Neem contact op met
          onze Maître, of kijk rustig verder op onze website!
        </p>

        <figure class="flair">
          <img
            src="images/image005.png"
            alt="Schermers in actie tijdens training"
            class="flair_image"
          />
          <figcaption>
            Niet onze schermers tijdens een training op vrijdagavond, maar wel
            een mooi plaatje.
          </figcaption>
        </figure>

        <p></p>
      </div>
    </main>
    <!-- Footer -->
    <div id="footer"></div>
  </body>
</html>
